name: Weekly rule-suggestion miner

# Runs scripts/suggest-rules.mts once a week. The miner reads the editor's
# review-queue dismissals (Claim.humanDecision) and surfaces words/phrases that
# are common in dismissed claims but rare in published ones — candidate
# deterministic filter rules for src/lib/claim-quality.ts.
#
# It's a pure script (no AI / no Claude API), so it stays off the metered
# automation path. When it finds candidates it opens a GitHub issue (the
# "ping") for review with Claude; when it finds none it exits quietly so the
# repo isn't spammed with empty issues. Trigger manually anytime via the
# "Run workflow" button (workflow_dispatch) to see the current candidates.

on:
  schedule:
    # Sunday 06:00 UTC — start of the Israeli work week, clear of the Friday digest.
    - cron: "0 6 * * 0"
  workflow_dispatch:

concurrency:
  group: suggest-rules
  cancel-in-progress: false

permissions:
  contents: read
  issues: write

jobs:
  mine:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Generate Prisma client (Postgres)
        run: npm run db:gen
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Run rule miner
        id: miner
        run: |
          set -o pipefail
          npx tsx scripts/suggest-rules.mts | tee /tmp/rules.txt
          if grep -qE '^\s*\[(word|phrase)\]' /tmp/rules.txt; then
            echo "has_candidates=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_candidates=false" >> "$GITHUB_OUTPUT"
          fi
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      # Primary delivery: a private Telegram DM via the bot (the candidates are
      # internal dev notes, NOT for the public @bdukcoil channel — so they go to
      # TELEGRAM_ALERT_CHAT_ID, your private chat-id with the bot). If that
      # secret isn't set, fall back to a GitHub issue so candidates are never lost.
      - name: Notify candidates (Telegram, GitHub-issue fallback)
        if: steps.miner.outputs.has_candidates == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_ALERT_CHAT_ID: ${{ secrets.TELEGRAM_ALERT_CHAT_ID }}
        run: |
          BODY="$(cat /tmp/rules.txt)"
          HEADER="מועמדים לכללי סינון חדשים (מהדחיות שלך בבדיקה האנושית). לעבור עם קלוד לפני הוספה ל-claim-quality.ts; fp גבוה = לא להוסיף."
          if [ -n "$TELEGRAM_ALERT_CHAT_ID" ] && [ -n "$TELEGRAM_BOT_TOKEN" ]; then
            TEXT="$(printf '%s\n\n%s' "$HEADER" "$BODY")"
            curl -sS -X POST "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
              -H "Content-Type: application/json" \
              --data "$(jq -n --arg chat "$TELEGRAM_ALERT_CHAT_ID" --arg text "$TEXT" '{chat_id:$chat, text:$text, disable_web_page_preview:true}')"
            echo
            echo "Sent candidates to Telegram chat $TELEGRAM_ALERT_CHAT_ID."
          else
            echo "TELEGRAM_ALERT_CHAT_ID not set -> GitHub-issue fallback. Set the secret to receive these on Telegram."
            {
              echo "Candidate filter rules from review-queue dismissals. Review with Claude before adding to src/lib/claim-quality.ts; high fp = don't add."
              echo
              echo '```'
              echo "$BODY"
              echo '```'
            } > /tmp/body.md
            gh issue create \
              --title "Rule-miner candidates — $(date -u +%Y-%m-%d)" \
              --body-file /tmp/body.md
          fi
