name: Fresh-news fact-check (every 2 hours)

# Fact-checks recently-fetched RSS news so today's claims surface on
# the site within ~2 hours of publication. Knesset transcripts and
# older RSS backlog are NOT touched here — they ride the once-daily
# pipeline (.github/workflows/daily-ingest.yml) on a separate budget.
#
# Cadence rationale:
#   30-min ingest (rss-ingest.yml) + 2-hour fact-check means any RSS
#   article is in the DB within 30 min and fact-checked within ~2.5
#   hours of publication. Cron syntax can't natively express "every
#   90 minutes" so we use the cleaner 2-hour cadence and accept the
#   slight delay.
#
# Schedule offset: fires at :15 of every even UTC hour, not :00. The
# RSS ingest workflow fires at :00 and :30 (`0,30 * * * *`); without
# the 15-minute offset, both workflows kicked off simultaneously at
# every even hour. The fresh-process query then ran against the DB
# before the parallel ingest had committed its newest rows, so the
# freshest articles slipped through to the NEXT 2h tick. Offsetting
# by :15 lets ingest finish (and its DB writes settle) before
# fresh-process queries.
#
# Cost ceiling: limit=60 means up to 60 extraction calls per run.
# With ~10% claim yield that's ~6 grounded fact-checks per run.
# At ~$0.05/grounded claim + ~$0.0015 extraction per article =
# ~$0.40/run × 12/day = ~$4.80/day worst case. In practice many
# runs find few new articles and cost much less.
#
# Bumped from 30 → 60 on 2026-05-22. Reason: RSS ingest fires every
# 30 min and accumulates ~80-120 new articles between fresh-process
# ticks; the previous limit of 30 only covered the newest third per
# tick, leaving the rest for the once-daily backlog lane.
on:
  schedule:
    - cron: "15 */2 * * *"
  workflow_dispatch:

concurrency:
  group: fresh-process
  # If a run is still in flight when the next one fires, just skip the
  # new one. Better to lose a tick than overlap and double-bill.
  cancel-in-progress: false

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: POST /api/process?mode=fresh
        env:
          TARGET_URL: ${{ secrets.SITE_URL || 'https://bduk.co.il' }}
          ADMIN_SECRET: ${{ secrets.ADMIN_SECRET }}
        run: |
          set -eo pipefail
          response=$(curl --silent --show-error --fail-with-body \
            --request POST \
            --max-time 540 \
            --header "Authorization: Bearer ${ADMIN_SECRET}" \
            "${TARGET_URL}/api/process?mode=fresh&limit=60")
          echo "$response" | head -c 4000
          echo
